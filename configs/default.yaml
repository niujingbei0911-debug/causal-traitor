# ============================================
# The Causal Traitor - Default Configuration
# ============================================

# --- Model Configuration ---
# Backend options: "dashscope"/"api" (Alibaba Bailian Qwen API), "vllm",
# "ollama", or "mock". DashScope requires the DASHSCOPE_API_KEY env var.
models:
  agent_a:  # Traitor
    name: "qwen2.5-7b-instruct"
    backend: "dashscope"
    temperature: 0.8
    max_tokens: 2048
  agent_b:  # Scientist
    name: "qwen2.5-14b-instruct"
    backend: "dashscope"
    temperature: 0.3
    max_tokens: 2048
  agent_c:  # Auditor
    name: "qwen2.5-72b-instruct"
    backend: "dashscope"
    temperature: 0.1
    max_tokens: 4096
  jury:
    backend: "dashscope"
    temperature: 0.2
    max_tokens: 2048
    models:
      - "qwen2.5-7b-instruct"
      - "qwen2.5-14b-instruct"
      - "qwen2.5-7b-instruct"
    voting: "weighted"  # majority | weighted | bayesian

# --- Game Configuration ---
game:
  max_rounds: 5
  debate_turns_per_round: 3
  causal_levels: [1, 2, 3]  # Pearl's ladder levels
  initial_difficulty: 0.5
  time_limit_per_turn: 60  # seconds

# --- Difficulty Controller ---
difficulty:
  target_deception_rate: 0.4
  window_size: 5
  adjustment_rate: 0.1
  tolerance: 0.08
  min_difficulty: 0.2
  max_difficulty: 0.95

# --- Evolution Tracker ---
evolution:
  strategy_embedding_dim: 64
  similarity_threshold: 0.85
  max_history: 100

# --- Evaluation ---
# 指标名称与 evaluation/metrics.py CausalMetrics 方法名一一对应
evaluation:
  metrics:
    # 主线 verdict-centric 指标
    - verdict_accuracy
    - verdict_macro_f1
    - invalid_claim_acceptance_rate
    - unidentifiable_awareness
    - expected_calibration_error
    - brier_score
    - countermodel_coverage
    # Appendix 指标
    - deception_success_rate          # DSR
    - evolution_complexity_index      # ECI

# --- Visualization ---
visualization:
  api_host: "0.0.0.0"
  api_port: 8000
  websocket_path: "/ws/game"
  enable_live_update: true

# --- Logging ---
logging:
  level: "INFO"
  save_dir: "logs/"
  use_wandb: false
  wandb_project: "causal-traitor"

# --- Data ---
data:
  scenarios_dir: "data/scenarios/"
  cache_dir: "data/cache/"
  output_dir: "outputs/"
